[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "codex-teammate"
version = "0.1.0"
description = "OpenAI Codex CLI as a first-class teammate in Claude Code's agent-team protocol, without a Claude LLM wrapper."
requires-python = ">=3.12"
license = "MIT"
readme = "README.md"
dependencies = [
    # Upstream cs50victor/claude-code-teams-mcp. Pinned to a local checkout for
    # feasibility prototype; swap to a git URL or PyPI release once a conformant
    # fork is published.
    "claude-teams",
    "pydantic>=2.10",
    # fastmcp is already a transitive dep of claude-teams; we use it directly
    # for the narrowed v7 wrapper MCP server in `codex_teammate.wrapper_server`.
    "fastmcp==3.0.0b1",
    # v7.2 uses jsonschema to validate `--output-last-message` contents in
    # Python because `codex exec resume` on codex-cli 0.122.0 does not
    # accept `--output-schema`. Already a transitive dep; declared
    # explicitly because we import it directly now.
    "jsonschema>=4.20",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[project.scripts]
codex-teammate = "codex_teammate.cli:main"
codex-teammate-spawn-shim = "codex_teammate.spawn_shim:main"
codex-teammate-wrapper = "codex_teammate.wrapper_server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/codex_teammate"]

[tool.uv.sources]
claude-teams = { path = "/tmp/cs50victor-teams", editable = false }

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
