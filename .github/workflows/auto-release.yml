name: Auto-tag and release on version bump

# When a push to main changes the version in npm/package.json or
# pyproject.toml, this workflow:
#   1. Verifies both manifests agree on the version (lock-step constraint)
#   2. Creates a v$VERSION tag at the merged commit
#   3. Creates a GitHub release with PR body as release notes
#   4. Runs the test suite
#   5. Publishes to npm AND PyPI
#
# All in one workflow run — no cross-workflow dispatch (which is fragile
# when GITHUB_TOKEN can't be granted actions:write). One merge to main =
# one release. release.yml is kept as a fallback for manual `v*` tag pushes
# from a maintainer's machine.

on:
  push:
    branches: [main]
    paths:
      - 'npm/package.json'
      - 'pyproject.toml'

concurrency:
  group: auto-release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write   # required by `npm publish --provenance`

jobs:
  maybe-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag_created: ${{ steps.check_tag.outputs.exists == 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Read manifest versions
        id: ver
        run: |
          set -euo pipefail
          npm_version=$(node -p "require('./npm/package.json').version")
          py_version=$(awk -F\" '/^version *= */ {print $2; exit}' pyproject.toml)
          if [ "$npm_version" != "$py_version" ]; then
            echo "::error::npm/package.json version ($npm_version) does not match pyproject.toml ($py_version). Bump both in lock-step."
            exit 1
          fi
          echo "version=$npm_version" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $npm_version"

      - name: Skip if v$VERSION tag already exists
        id: check_tag
        run: |
          set -euo pipefail
          tag="v${{ steps.ver.outputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; nothing to do."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release notes from PR body
        if: steps.check_tag.outputs.exists == 'false'
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pr_number=$(gh pr list --state merged --base main --search "${{ github.sha }}" --json number --jq '.[0].number // empty')
          if [ -n "$pr_number" ]; then
            gh pr view "$pr_number" --json body --jq '.body' > pr_body.md
            echo "source=PR #$pr_number" >> "$GITHUB_OUTPUT"
          else
            git log -1 --format='%B' "${{ github.sha }}" > pr_body.md
            echo "source=commit ${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi
          echo "notes_path=pr_body.md" >> "$GITHUB_OUTPUT"

      - name: Create tag and release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="v${{ steps.ver.outputs.version }}"
          gh release create "$tag" \
            --target "${{ github.sha }}" \
            --title "$tag" \
            --notes-file "${{ steps.notes.outputs.notes_path }}"
          echo "Released $tag (notes from ${{ steps.notes.outputs.source }})."

  test:
    needs: maybe-tag
    if: needs.maybe-tag.outputs.tag_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync deps
        run: uv sync --all-extras
      - name: Run pytest (with up to 3 retries for known concurrency flake)
        run: |
          set +e
          uv run pytest -q
          status=$?
          attempt=1
          while [ $status -ne 0 ] && [ $attempt -lt 4 ]; do
            echo "::warning::pytest failed (attempt $attempt); retrying --last-failed"
            uv run pytest -q --last-failed
            status=$?
            attempt=$((attempt + 1))
          done
          if [ $status -ne 0 ]; then
            echo "::error::pytest failed 4 times — not a flake"
            exit $status
          fi

  publish-npm:
    needs: [maybe-tag, test]
    if: needs.maybe-tag.outputs.tag_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required by --provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish
        working-directory: npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    needs: [maybe-tag, test]
    if: needs.maybe-tag.outputs.tag_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Build distributions
        run: uv build
      - name: Publish
        run: uv publish --token ${{ secrets.PYPI_API_TOKEN }}
