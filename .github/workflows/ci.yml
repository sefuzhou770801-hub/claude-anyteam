name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync deps
        run: uv sync --all-extras
      - name: Run pytest (with up to 3 retries for known concurrency flake)
        run: |
          set +e
          uv run pytest -q
          status=$?
          attempt=1
          while [ $status -ne 0 ] && [ $attempt -lt 4 ]; do
            echo "::warning::pytest failed (attempt $attempt); retrying --last-failed"
            uv run pytest -q --last-failed
            status=$?
            attempt=$((attempt + 1))
          done
          if [ $status -ne 0 ]; then
            echo "::error::pytest failed 4 times — not a flake"
            exit $status
          fi
